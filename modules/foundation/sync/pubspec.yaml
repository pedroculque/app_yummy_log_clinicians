name: sync_foundation
description: Sincronização offline-first (Firestore) para o app Yummy Log.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  auth_foundation:
    path: ../auth
  cloud_firestore: ^5.6.5
  connectivity_plus: ^6.1.3
  equatable: ^2.0.5
  firebase_storage: ^12.4.4
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^8.0.2
  http: ^1.2.2
  meal_domain:
    path: ../../shared/meal_domain
  path: ^1.9.0
  path_provider: ^2.1.5
  persistence_foundation:
    path: ../persistence
  sembast: ^3.4.0
  ui_kit:
    git:
      url: https://github.com/pedroculque/flutter_ui_kit.git
      ref: main

dev_dependencies:
  bloc_lint: ^0.3.7
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
