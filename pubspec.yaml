name: app_yummy_log_clinicians
description: YummyLog for Clinicians - App para profissionais de saúde acompanharem pacientes.
version: 1.0.0+16
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  auth_foundation:
    path: modules/foundation/auth
  bloc: ^9.2.0
  cloud_firestore: ^5.6.2
  feature_contract:
    path: modules/shared/feature_contract
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: ^8.0.2
  go_router: ^14.6.3
  image_picker: ^1.1.2
  insights_feature:
    path: modules/features/insights
  intl: ^0.20.2
  patients_feature:
    path: modules/features/patients
  persistence_foundation:
    path: modules/foundation/persistence
  settings_feature:
    path: modules/features/settings
  sync_foundation:
    path: modules/foundation/sync
  ui_kit:
    git:
      url: https://github.com/pedroculque/flutter_ui_kit.git
      ref: main
  yummy_log_l10n:
    path: modules/shared/yummy_log_l10n

dev_dependencies:
  bloc_lint: ^0.3.7
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.22
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
